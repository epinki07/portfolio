<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1800 1060" width="1800" height="1060" role="img" aria-labelledby="title desc">
  <title id="title">Mapa curricular aclarado de Ingeniería en Desarrollo de Software y Negocios Digitales</title>
  <desc id="desc">Visión general de la carrera en tres etapas: Técnico Superior Universitario (1°-6° cuatrimestre), Ingeniería (7°-10° cuatrimestre) y Especialidad en Nube (11°-13° cuatrimestre), con duración total de 4 años y 4 meses.</desc>

  <defs>
    <style>
      .bg          { fill: #f8fbff; }
      .ink-dark    { fill: #1f2d5a; }
      .ink-medium  { fill: #2a4f80; }
      .ink-muted   { fill: #5c7698; }
      .brand-amber { fill: #f2a900; }
      .divider     { stroke: #d7e4f2; stroke-width: 1.5; }

      .font-title    { font-family: 'Inter', Arial, sans-serif; font-weight: 800; }
      .font-body     { font-family: 'Inter', Arial, sans-serif; font-weight: 600; }
      .font-light    { font-family: 'Inter', Arial, sans-serif; font-weight: 500; }
      .font-mono     { font-family: 'Fira Code', 'Courier New', monospace; font-weight: 600; letter-spacing: 0.1em; }

      .pill-light  { fill: #35b2df; }
      .pill-medium { fill: #2a7dbe; }
      .pill-dark   { fill: #24345e; }

      .band-light  { fill: #35b2df; }
      .band-medium { fill: #2a7dbe; }
      .band-dark   { fill: #24345e; }

      .card-body   { fill: #ffffff; stroke: #dbe5f2; stroke-width: 1.5; }

      .cat-title   { fill: #1f2d5a; font-family: 'Inter', Arial, sans-serif; font-weight: 800; font-size: 19px; letter-spacing: 0.04em; }
      .cat-body    { fill: #46607f; font-family: 'Inter', Arial, sans-serif; font-weight: 500; font-size: 17px; }

      .stage-label { fill: #ffffff; font-family: 'Fira Code', monospace; font-weight: 600; font-size: 15px; letter-spacing: 0.2em; opacity: 0.85; }
      .stage-name  { fill: #ffffff; font-family: 'Inter', Arial, sans-serif; font-weight: 800; font-size: 26px; }

      .meta-label  { fill: #5c7698; font-family: 'Inter', Arial, sans-serif; font-weight: 600; font-size: 16px; }
      .duration    { fill: #1f2d5a; font-family: 'Inter', Arial, sans-serif; font-weight: 800; font-size: 42px; }
      .diploma     { fill: #2a7dbe; font-family: 'Inter', Arial, sans-serif; font-weight: 700; font-size: 17px; }

      .rvoe        { fill: #f2a900; font-family: 'Fira Code', monospace; font-weight: 700; font-size: 15px; letter-spacing: 0.12em; }

      .arrow       { fill: none; stroke: #2a4f80; stroke-width: 4; stroke-linecap: round; stroke-linejoin: round; }
      .footer-pill { fill: #1f2d5a; }
      .footer-text { fill: #ffffff; font-family: 'Inter', Arial, sans-serif; font-weight: 800; }
    </style>
  </defs>

  <!-- ── BACKGROUND ── -->
  <rect class="bg" width="1800" height="1060" rx="24"/>

  <!-- ── HEADER ── -->
  <text x="50" y="60" class="font-mono brand-amber" font-size="16">MAPA CURRICULAR · MODALIDAD PRESENCIAL DUAL</text>
  <text x="1750" y="60" text-anchor="end" class="font-title ink-dark" font-size="18">Tecnológico del Software</text>
  <text x="50" y="115" class="font-title ink-dark" font-size="36">Ingeniería en Desarrollo de Software y Negocios Digitales</text>
  <text x="50" y="145" class="font-light ink-muted" font-size="18">Modelo Dual de Formación Gradual · 3 etapas · 13 cuatrimestres</text>

  <!-- ── TIMELINE 13 CUATRIMESTRES ── -->
  <g transform="translate(0, 170)">
    <text x="50" y="22" class="font-mono ink-muted" font-size="14">LÍNEA DEL TIEMPO</text>

    <!-- TSU pills (1-6, light blue) -->
    <g>
      <rect x="72"   y="40" width="122" height="44" rx="10" class="pill-light"/>
      <rect x="202"  y="40" width="122" height="44" rx="10" class="pill-light"/>
      <rect x="332"  y="40" width="122" height="44" rx="10" class="pill-light"/>
      <rect x="462"  y="40" width="122" height="44" rx="10" class="pill-light"/>
      <rect x="592"  y="40" width="122" height="44" rx="10" class="pill-light"/>
      <rect x="722"  y="40" width="122" height="44" rx="10" class="pill-light"/>
      <text x="133" y="70" text-anchor="middle" fill="#ffffff" class="font-title" font-size="19">1°</text>
      <text x="263" y="70" text-anchor="middle" fill="#ffffff" class="font-title" font-size="19">2°</text>
      <text x="393" y="70" text-anchor="middle" fill="#ffffff" class="font-title" font-size="19">3°</text>
      <text x="523" y="70" text-anchor="middle" fill="#ffffff" class="font-title" font-size="19">4°</text>
      <text x="653" y="70" text-anchor="middle" fill="#ffffff" class="font-title" font-size="19">5°</text>
      <text x="783" y="70" text-anchor="middle" fill="#ffffff" class="font-title" font-size="19">6°</text>
    </g>

    <!-- Ingeniería pills (7-10, medium blue) -->
    <g>
      <rect x="870"  y="40" width="122" height="44" rx="10" class="pill-medium"/>
      <rect x="1000" y="40" width="122" height="44" rx="10" class="pill-medium"/>
      <rect x="1130" y="40" width="122" height="44" rx="10" class="pill-medium"/>
      <rect x="1260" y="40" width="122" height="44" rx="10" class="pill-medium"/>
      <text x="931"  y="70" text-anchor="middle" fill="#ffffff" class="font-title" font-size="19">7°</text>
      <text x="1061" y="70" text-anchor="middle" fill="#ffffff" class="font-title" font-size="19">8°</text>
      <text x="1191" y="70" text-anchor="middle" fill="#ffffff" class="font-title" font-size="19">9°</text>
      <text x="1321" y="70" text-anchor="middle" fill="#ffffff" class="font-title" font-size="19">10°</text>
    </g>

    <!-- Especialidad pills (11-13, dark blue) -->
    <g>
      <rect x="1390" y="40" width="122" height="44" rx="10" class="pill-dark"/>
      <rect x="1520" y="40" width="122" height="44" rx="10" class="pill-dark"/>
      <rect x="1650" y="40" width="122" height="44" rx="10" class="pill-dark"/>
      <text x="1451" y="70" text-anchor="middle" fill="#ffffff" class="font-title" font-size="19">11°</text>
      <text x="1581" y="70" text-anchor="middle" fill="#ffffff" class="font-title" font-size="19">12°</text>
      <text x="1711" y="70" text-anchor="middle" fill="#ffffff" class="font-title" font-size="19">13°</text>
    </g>
  </g>

  <!-- ── STAGE CARDS ── -->
  <!-- Card dimensions: each 545 wide, positioned at x=50, x=628, x=1205 -->
  <!-- Stage top y=290, bottom y=930 -->

  <!-- ===== STAGE 1 · TSU ===== -->
  <g>
    <rect x="50"  y="290" width="545" height="70"  rx="16" class="band-light"/>
    <rect x="50"  y="345" width="545" height="600" rx="16" class="card-body"/>
    <rect x="50"  y="345" width="545" height="25"  fill="#35b2df"/>

    <text x="78"  y="325" class="stage-label">ETAPA 1 · BASE TÉCNICA</text>
    <text x="78"  y="360" class="stage-name">TSU en Desarrollo de Software</text>

    <!-- Meta -->
    <text x="78"  y="410" class="meta-label">1° al 6° cuatrimestre</text>
    <text x="78"  y="460" class="duration">2 años</text>
    <text x="78"  y="490" class="diploma">→ Técnico Superior Universitario en Desarrollo e Innovación de Software</text>
    <line x1="78" y1="510" x2="567" y2="510" class="divider"/>

    <!-- Categories -->
    <text x="78"  y="545" class="cat-title">🧮 MATEMÁTICAS</text>
    <text x="78"  y="572" class="cat-body">Álgebra · Matemáticas discretas · Cálculo</text>
    <text x="78"  y="594" class="cat-body">Funciones · Probabilidad y estadística</text>

    <text x="78"  y="630" class="cat-title">💻 PROGRAMACIÓN</text>
    <text x="78"  y="657" class="cat-body">Fund. computación · POO · Estructurada</text>
    <text x="78"  y="679" class="cat-body">Estructuras de datos · Aplicada · Bases de datos</text>

    <text x="78"  y="715" class="cat-title">⚙️ SISTEMAS Y REDES</text>
    <text x="78"  y="742" class="cat-body">Arquitectura de computadoras · SO</text>
    <text x="78"  y="764" class="cat-body">Fundamentos de redes · Arquitectura de software</text>

    <text x="78"  y="800" class="cat-title">🎯 ESTRATEGIAS DE TECNOLOGÍA</text>
    <text x="78"  y="827" class="cat-body">Desarrollo de software I · II · III</text>

    <text x="78"  y="863" class="cat-title">🗣️ INGLÉS · 🧠 FORMACIÓN HUMANA</text>
    <text x="78"  y="890" class="cat-body">Inglés I–VI · Inteligencia emocional</text>
    <text x="78"  y="912" class="cat-body">Pensamiento estratégico · Ética profesional</text>

    <text x="567" y="930" text-anchor="end" class="rvoe">RVOE 299</text>
  </g>

  <!-- ===== STAGE 2 · INGENIERÍA ===== -->
  <g>
    <rect x="628" y="290" width="545" height="70"  rx="16" class="band-medium"/>
    <rect x="628" y="345" width="545" height="600" rx="16" class="card-body"/>
    <rect x="628" y="345" width="545" height="25"  fill="#2a7dbe"/>

    <text x="656" y="325" class="stage-label">ETAPA 2 · INGENIERÍA</text>
    <text x="656" y="360" class="stage-name">Desarrollo de Software y Negocios</text>

    <!-- Meta -->
    <text x="656" y="410" class="meta-label">7° al 10° cuatrimestre</text>
    <text x="656" y="460" class="duration">+ 1 año 4 meses</text>
    <text x="656" y="490" class="diploma">→ Ingeniería en Desarrollo de Software y Negocios Digitales</text>
    <line x1="656" y1="510" x2="1145" y2="510" class="divider"/>

    <!-- Categories -->
    <text x="656" y="545" class="cat-title">📊 OPTATIVA A · DATOS E IA</text>
    <text x="656" y="572" class="cat-body">Análisis de datos · IA y Machine Learning</text>
    <text x="656" y="594" class="cat-body">Ciencia de datos en la nube · Proyectos integrados</text>

    <text x="656" y="630" class="cat-title">☁️ OPTATIVA B · NUBE Y CIBERSEGURIDAD</text>
    <text x="656" y="657" class="cat-body">Desarrollo de software avanzado</text>
    <text x="656" y="679" class="cat-body">Ciberseguridad · Nube y virtualización · Admin TI</text>

    <text x="656" y="715" class="cat-title">💼 NEGOCIO DIGITAL</text>
    <text x="656" y="742" class="cat-body">Equipos de alto desempeño · Hab. gerenciales</text>
    <text x="656" y="764" class="cat-body">Finanzas para neg. digitales · Negociación · Pitching</text>

    <text x="656" y="800" class="cat-title">🚀 EMPRENDIMIENTO</text>
    <text x="656" y="827" class="cat-body">Planeación de negocios · Marketing y e-commerce</text>

    <text x="656" y="863" class="cat-title">🗣️ INGLÉS APLICADO</text>
    <text x="656" y="890" class="cat-body">Inglés para desarrollo de software I–IV</text>

    <text x="1145" y="930" text-anchor="end" class="rvoe">RVOE 341</text>
  </g>

  <!-- ===== STAGE 3 · ESPECIALIDAD ===== -->
  <g>
    <rect x="1205" y="290" width="545" height="70"  rx="16" class="band-dark"/>
    <rect x="1205" y="345" width="545" height="600" rx="16" class="card-body"/>
    <rect x="1205" y="345" width="545" height="25"  fill="#24345e"/>

    <text x="1233" y="325" class="stage-label">ETAPA 3 · ESPECIALIDAD</text>
    <text x="1233" y="360" class="stage-name">Desarrollo de Software en la Nube</text>

    <!-- Meta -->
    <text x="1233" y="410" class="meta-label">11° al 13° cuatrimestre</text>
    <text x="1233" y="460" class="duration">+ 1 año</text>
    <text x="1233" y="490" class="diploma">→ Especialidad en Desarrollo de Software en la Nube</text>
    <line x1="1233" y1="510" x2="1722" y2="510" class="divider"/>

    <!-- Categories -->
    <text x="1233" y="545" class="cat-title">🏗️ METODOLOGÍAS Y PROYECTOS</text>
    <text x="1233" y="572" class="cat-body">Metodologías, procesos y artefactos I–II</text>
    <text x="1233" y="594" class="cat-body">Administración de proyectos (PMP)</text>

    <text x="1233" y="630" class="cat-title">🧩 PATRONES Y ARQUITECTURA</text>
    <text x="1233" y="657" class="cat-body">Patrones de diseño de software</text>
    <text x="1233" y="679" class="cat-body">Computación paralela · Procesamiento distribuido</text>

    <text x="1233" y="715" class="cat-title">🌐 PROGRAMACIÓN AVANZADA</text>
    <text x="1233" y="742" class="cat-body">Programación aplicada · Cómputo en la nube</text>
    <text x="1233" y="764" class="cat-body">Análisis de negocio</text>

    <text x="1233" y="800" class="cat-title">🧪 DEVOPS Y CALIDAD</text>
    <text x="1233" y="827" class="cat-body">Pruebas de software · DevOps</text>
    <text x="1233" y="849" class="cat-body">Administración de cómputo en la nube</text>

    <text x="1233" y="885" class="cat-title">🗣️ INGLÉS TECNOLOGÍA Y NEGOCIOS</text>
    <text x="1233" y="912" class="cat-body">Inglés para Tecnología y Negocios I–III</text>

    <text x="1722" y="930" text-anchor="end" class="rvoe">RVOE 300</text>
  </g>

  <!-- ── CONNECTING ARROWS BETWEEN STAGES ── -->
  <g>
    <path class="arrow" d="M595 660 L628 660"/>
    <path class="arrow" d="M620 652 L628 660 L620 668"/>
    <path class="arrow" d="M1173 660 L1205 660"/>
    <path class="arrow" d="M1197 652 L1205 660 L1197 668"/>
  </g>

  <!-- ── DURATION FOOTER ── -->
  <g>
    <rect x="50" y="975" width="1700" height="60" rx="16" class="footer-pill"/>
    <text x="900" y="1015" text-anchor="middle" class="footer-text" font-size="24">
      <tspan class="brand-amber" font-size="15" font-family="Fira Code, monospace" letter-spacing="0.18em">DURACIÓN TOTAL</tspan>
      <tspan>  ·  4 AÑOS, 4 MESES  ·  13 CUATRIMESTRES  ·  2 RUTAS OPTATIVAS</tspan>
    </text>
  </g>
</svg>
